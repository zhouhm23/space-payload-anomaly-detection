[pytest]
markers =
    slow: marks tests as slow (require model loading, GPU/CPU inference)
DJANGO_SETTINGS_MODULE = django_phm.settings
django_find_project = false
pythonpath = ground ground/django_phm
testpaths = space/tests ground/tests tests ground/phm/tests ground/django_phm/phm_site/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
