{% load static %}<!DOCTYPE html>
<!--
  monitor.html — real-time monitoring page (Task 9).
  Standalone full-screen document (does NOT extend admin/base_site.html).
  Reason: the original dashboard.html uses `body { height:100vh; display:flex;
  flex-direction:column; overflow:hidden }` for a full-viewport flex layout.
  Inheriting SimpleUI's admin chrome wraps the dashboard inside a sidebar +
  topbar + padded #content wrapper, which breaks every panel's sizing.
  This template is a plain HTML page Django just renders; only {% load static %}
  is used for static URLs. A floating "返回后台" link in the top-right links
  back to /admin/ for SimpleUI management.

  Migrated from src/ground/frontend/dashboard.html (2653 lines):
  - CSS:  static/phm_site/css/monitor.css (verbatim from <style> block)
  - JS:   static/phm_site/js/monitor.js   (verbatim from <script> block;
          trailing bare init() removed; this template calls init() via
          DOMContentLoaded instead — prevents double-init / duplicate pollers)
  - HTML body below (header + #mainContent + #bottomPanel + 4 modal overlays)
          is copied VERBATIM from dashboard.html; inline onclick handlers and
          id attributes are preserved so monitor.js can bind to them.
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>空间站有效载荷预测性维护支持系统</title>
  <link rel="stylesheet" type="text/css" href="{% static 'phm_site/css/monitor.css' %}">
</head>
<body>
  <!-- 顶栏 -->
  <header id="headerBar">
    <div class="header-title">🚀 空间站有效载荷预测性维护支持系统</div>
    <div class="header-right">
      <div class="link-status">
        <span class="status-dot" id="linkDot"></span>
        <span id="linkText">天地链路 正常</span>
      </div>
      <div class="utc-clock" id="utcClock"></div>
      <div class="health-ring-wrap">
        <span>系统健康</span>
        <canvas class="health-ring" id="healthRing" width="96" height="96"></canvas>
      </div>
      <a href="/admin/" style="background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-primary);padding:4px 12px;border-radius:6px;text-decoration:none;font-size:0.85rem;">⚙️ 后台管理</a>
      <button style="background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-primary);padding:4px 12px;border-radius:6px;cursor:pointer;" onclick="openDbModal()">📊 数据库</button>
    </div>
  </header>

  <!-- 主内容 -->
  <div id="mainContent">
    <!-- 左栏 设备树 -->
    <div id="leftPanel">
      <div class="panel-header">
        <span>📡 有效载荷设备树</span>
        <div class="buttons">
          <button onclick="addSensor()">➕</button>
          <button onclick="addFolder()">📁</button>
          <button onclick="saveConfig()">💾</button>
        </div>
      </div>
      <div id="deviceTree"></div>
    </div>

    <!-- 中央传感器网格 -->
    <div id="centerPanel">
      <div class="device-diagram" id="deviceDiagramWrap">
        <canvas id="deviceDiagram"></canvas>
        <div class="diagram-tooltip" id="diagramTooltip"></div>
        <div class="diagram-legend">
          <span><i style="background:#19be6b"></i>健康</span>
          <span><i style="background:#f5a623"></i>警告</span>
          <span><i style="background:#ed3f14"></i>危险</span>
        </div>
      </div>
      <div class="gauges-grid" id="gaugesGrid"></div>
    </div>

    <!-- 右栏 告警/预警 -->
    <div id="rightPanel">
      <div class="right-card">
        <h3>⚠️ 预测预警</h3>
        <div id="warningsList"></div>
      </div>
      <div class="right-card">
        <h3>🚨 实测告警</h3>
        <div id="alertsList"></div>
      </div>
      <div class="right-card" style="display:flex;align-items:center;gap:8px;padding:8px 12px;">
        <button id="autoDiagBtn" class="diag-btn" data-running="false" onclick="toggleAutoDiag()">🤖 全自动诊断</button>
        <span id="autoDiagStatus" style="font-size:0.7rem;color:var(--text-secondary);"></span>
      </div>
      <div class="right-card" id="rulCard">
        <h3>🔋 RUL 剩余寿命 <span style="font-size:0.65rem;color:var(--text-secondary);">C-MAPSS 基准</span></h3>
        <div id="rulList"></div>
      </div>
    </div>
  </div>

  <!-- 底部图表区 -->
  <div id="bottomPanel">
    <div class="chart-controls">
      <span style="font-size:0.8rem;">窗口</span>
      <input type="number" id="winCount" value="512" min="1" max="10000">
      <span style="font-size:0.8rem;">Y min</span>
      <input type="number" id="yMin" value="-1" step="0.1">
      <span style="font-size:0.8rem;">Y max</span>
      <input type="number" id="yMax" value="1" step="0.1">
      <button id="btnRealTime" class="active" onclick="setMode('realtime')">▶ 实时</button>
      <button id="btnFrozen" onclick="setMode('frozen')">⏸ 冻结</button>
      <button onclick="resetChart()">↺ 重置</button>
      <button onclick="openExportModal()">📥 导出</button>
      <span id="chunkStatus" style="font-size:0.75rem;color:var(--text-secondary);"></span>
    </div>
    <div class="chart-wrap">
      <canvas id="chartCanvas"></canvas>
      <div class="chart-tooltip" id="chartTooltip"></div>
    </div>
    <div class="timeline-bar" id="timelineBar">
      <div class="timeline-track">
        <div class="timeline-window" id="timelineWindow"></div>
      </div>
    </div>
  </div>

  <!-- 数据库模态框 -->
  <div class="modal-overlay" id="dbModalOverlay" onclick="if(event.target===this) closeDbModal()">
    <div class="modal" style="position:relative;">
      <button class="modal-close" onclick="closeDbModal()">✕</button>
      <div class="modal-header">
        <button class="modal-tab active" onclick="switchDbTab(0)">概览</button>
        <button class="modal-tab" onclick="switchDbTab(1)">历史遥测</button>
        <button class="modal-tab" onclick="switchDbTab(2)">检测明细</button>
        <button class="modal-tab" onclick="switchDbTab(3)">告警历史</button>
      </div>
      <div class="modal-body" id="dbModalBody"></div>
    </div>
  </div>

  <!-- 导出模态框 -->
  <div class="modal-overlay" id="exportModalOverlay" onclick="if(event.target===this) closeExportModal()">
    <div class="modal" style="width:500px; position:relative;">
      <button class="modal-close" onclick="closeExportModal()">✕</button>
      <div class="modal-body">
        <h3>📥 导出数据</h3>
        <div class="export-form">
          <div><strong>选择通道:</strong></div>
          <div class="export-channels" id="exportChannels"></div>
          <div><label>开始时间: <input type="datetime-local" id="exportStart"></label></div>
          <div><label>结束时间: <input type="datetime-local" id="exportEnd"></label></div>
          <div>
            <label><input type="radio" name="fmt" value="csv" checked> CSV</label>
            <label><input type="radio" name="fmt" value="xlsx"> XLSX</label>
          </div>
          <button onclick="doExport()" style="align-self:flex-start;">开始导出</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 新建/编辑设备模态框 -->
  <div class="modal-overlay" id="deviceModalOverlay" onclick="if(event.target===this) closeDeviceModal()">
    <div class="modal" style="width:420px; position:relative;">
      <button class="modal-close" onclick="closeDeviceModal()">✕</button>
      <div class="modal-body">
        <h3 id="deviceModalTitle">新建传感器</h3>
        <div class="export-form">
          <div><label>名称: <input type="text" id="devName" style="width:100%;background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-color);border-radius:4px;padding:4px 8px;"></label></div>
          <div id="devSensorFields">
            <div><label>数据源（天基采集通道）: <select id="devSource" style="width:100%;background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-color);border-radius:4px;padding:4px 8px;">
              <option value="file:NASA-MSL/C-1">NASA-MSL C-1（温度）</option>
              <option value="file:NASA-MSL/D-14">NASA-MSL D-14</option>
              <option value="virtual:sine">虚拟正弦波</option>
              <option value="virtual:multi_sine">虚拟多谐波</option>
            </select></label></div>
            <div><label>块大小: <input type="number" id="devBlockSize" value="512" min="64" max="4096" style="width:80px;background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-color);border-radius:4px;padding:4px 8px;"></label></div>
            <div style="border-top:1px solid var(--border-color);padding-top:8px;margin-top:4px;">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                <input type="checkbox" id="devUsePosition" onchange="togglePositionFields()" style="width:auto;">
                <span>设置示意图位置</span>
              </label>
              <div id="devPositionFields" style="display:none;margin-top:8px;">
                <div><label>所属模块（可选，留空归入"未分组"）: <input type="text" id="devModule" list="moduleCandidates" placeholder="如 电源模块（可输入新值）" style="width:100%;background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-color);border-radius:4px;padding:4px 8px;"></label></div>
                <datalist id="moduleCandidates"></datalist>
                <div><label>X 位置: <span id="devPosXLabel">0.50</span> <input type="range" id="devPosX" min="0" max="1" step="0.01" value="0.5" oninput="document.getElementById('devPosXLabel').textContent=parseFloat(this.value).toFixed(2);updatePosPreview()" style="width:100%;"></label></div>
                <div><label>Y 位置: <span id="devPosYLabel">0.50</span> <input type="range" id="devPosY" min="0" max="1" step="0.01" value="0.5" oninput="document.getElementById('devPosYLabel').textContent=parseFloat(this.value).toFixed(2);updatePosPreview()" style="width:100%;"></label></div>
                <div id="devPosPreview" style="position:relative;width:100%;height:60px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:4px;margin-top:4px;"></div>
              </div>
            </div>
          </div>
          <button onclick="submitDeviceModal()" style="align-self:flex-start;">确定</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="diagnosisModalOverlay" onclick="if(event.target===this) closeDiagnosisModal()">
    <div class="modal" style="width:560px;max-width:90vw;max-height:80vh;position:relative;display:flex;flex-direction:column;">
      <button class="modal-close" onclick="closeDiagnosisModal()">✕</button>
      <div class="modal-body" style="overflow-y:auto;flex:1;">
        <h3 id="diagnosisTitle">🔍 LLM 异常诊断</h3>
        <div id="diagnosisBody" class="diag-modal-body"></div>
      </div>
    </div>
  </div>

  <script src="{% static 'phm_site/js/monitor.js' %}"></script>
  <script>
  // Call init() after the DOM + monitor.js have loaded. dashboard.html called
  // init() at the very end of its <script>; the trailing call was removed from
  // monitor.js to avoid double-init when both the inline script below and a
  // bare tail were present.
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof init === 'function') init();
  });
  </script>
</body>
</html>
